<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shepherd Assets</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0d1f35;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 32px 60px;
      gap: 0;
    }

    /* Shield icon circle */
    .icon-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background-color: #1a4040;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .shield-icon {
      width: 52px;
      height: 52px;
    }

    /* Title */
    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 14px;
    }

    .tagline {
      font-size: 1.05rem;
      font-weight: 400;
      color: #8aa8c8;
      letter-spacing: 0.01em;
      margin-bottom: 40px;
    }

    /* Teal divider */
    .divider {
      width: 60px;
      height: 3px;
      background-color: #00c9a7;
      border-radius: 2px;
      margin-bottom: 48px;
    }

    /* Body copy */
    .body-copy {
      font-size: 1.1rem;
      line-height: 1.75;
      color: #c8d8ea;
      max-width: 540px;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .contact-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #8aa8c8;
      text-transform: uppercase;
    }

    .contact-email {
      font-size: 1rem;
      font-weight: 600;
      color: #00c9a7;
      text-decoration: none;
    }

    .contact-email:hover {
      text-decoration: underline;
    }

    .company-name {
      font-size: 0.85rem;
      color: #5a7a9a;
    }
  </style>
</head>
<body>

  <main class="main">
    <!-- Shield Icon -->
    <div class="icon-circle">
      <svg class="shield-icon" viewBox="0 0 52 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Shield shape -->
        <path
          d="M26 2L4 11v16c0 13.5 9.5 26.1 22 29 12.5-2.9 22-15.5 22-29V11L26 2z"
          fill="#00a88a"
          opacity="0.25"
        />
        <path
          d="M26 2L4 11v16c0 13.5 9.5 26.1 22 29 12.5-2.9 22-15.5 22-29V11L26 2z"
          stroke="#00c9a7"
          stroke-width="2.5"
          stroke-linejoin="round"
          fill="none"
        />
        <!-- Checkmark -->
        <polyline
          points="16,30 23,37 36,22"
          stroke="#00c9a7"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
      </svg>
    </div>

    <h1>Shepherd Assets</h1>
    <p class="tagline">Your money, automatically organized.</p>

    <div class="divider"></div>

    <p class="body-copy">
      A new era of money management is being built.<br />
      Stay tuned for updates when our app is complete.
    </p>
  </main>

  <footer>
    <span class="contact-label">Contact</span>
    <a class="contact-email" href="mailto:paul@shepherdassets.com">paul@shepherdassets.com</a>
    <span class="company-name">Shepherd Assets, Inc.</span>
  </footer>

</body>
</html>
